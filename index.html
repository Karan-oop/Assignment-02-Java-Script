<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Async Weather Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="page">

    <!-- Header -->
    <header class="header">
      <span class="header-icon">⛅</span>
      <h1 class="header-title">Async Weather Tracker</h1>
    </header>

    <!-- Main Grid: Left + Right -->
    <main class="main-grid">

      <!-- LEFT: Search Panel -->
      <section class="panel panel-left">
        <p class="panel-label">Search City</p>
        <div class="search-row">
          <input
            type="text"
            id="cityInput"
            class="search-input"
            placeholder="Delhi, London..."
            autocomplete="off"
            spellcheck="false"
          />
          <button class="search-btn" id="searchBtn">
            <span class="btn-text">Search</span>
            <span class="btn-spinner" id="btnSpinner"></span>
          </button>
        </div>
        <div class="inline-msg" id="inlineMsg"></div>

        <p class="panel-label">Search History</p>
        <div class="history-wrap" id="historyWrap">
          <span class="no-history" id="noHistory">No history yet</span>
        </div>
        <button class="clear-hist-btn" id="clearHistBtn">✕ Clear history</button>
      </section>

      <!-- RIGHT: Weather Info Panel -->
      <section class="panel panel-right" id="panelRight">
        <p class="panel-label">Weather Info</p>

        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🌍</div>
          <p>Search a city to see weather</p>
        </div>

        <div class="weather-error" id="weatherErr"></div>

        <div class="weather-rows" id="weatherRows">
          <div class="w-row">
            <span class="w-key">City</span>
            <span class="w-val" id="wCity">—</span>
          </div>
          <div class="w-row">
            <span class="w-key">Temp</span>
            <span class="w-val w-accent" id="wTemp">—</span>
          </div>
          <div class="w-row">
            <span class="w-key">Weather</span>
            <span class="w-val" id="wWeather">—</span>
          </div>
          <div class="w-row">
            <span class="w-key">Humidity</span>
            <span class="w-val" id="wHumidity">—</span>
          </div>
          <div class="w-row">
            <span class="w-key">Wind</span>
            <span class="w-val" id="wWind">—</span>
          </div>
          <div class="w-row">
            <span class="w-key">Feels Like</span>
            <span class="w-val" id="wFeels">—</span>
          </div>
          <div class="w-row">
            <span class="w-key">Visibility</span>
            <span class="w-val" id="wVis">—</span>
          </div>
        </div>
      </section>

    </main>

    <!-- Console Panel -->
    <section class="console-section">
      <div class="console-topbar">
        <div class="c-dots">
          <span class="cdot r"></span>
          <span class="cdot y"></span>
          <span class="cdot g"></span>
        </div>
        <span class="console-title">Console – Event Loop</span>
        <button class="c-clear-btn" id="clearConsoleBtn">Clear</button>
      </div>
      <div class="console-body" id="consoleBody"></div>
    </section>

  </div>

  <script src="script.js"></script>
</body>

</html>
