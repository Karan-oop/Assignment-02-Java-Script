<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Async Weather Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="kk.css"/>
</head>
<body>

  <div class="page">

    <!-- Header -->
    <header class="header">
      <span class="header-icon">⛅</span>
      <h1 class="header-title">Async Weather Tracker</h1>
    </header>

    <!-- Main Grid: Left + Right -->
    <main class="main-grid">

      <!-- LEFT: Search Panel -->
      <section class="panel panel-left">
        <p class="panel-label">Search City, Town or Locality</p>
        <div class="search-wrap-outer">
          <div class="search-row">
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              </span>
              <input
                type="text"
                id="cityInput"
                class="search-input"
                placeholder="e.g. Lajpat Nagar, Bandra, Shimla..."
                autocomplete="off"
                spellcheck="false"
              />
              <button class="input-clear-btn" id="inputClearBtn" title="Clear">✕</button>
            </div>
            <button class="search-btn" id="searchBtn">
              <span class="btn-text">Search</span>
              <span class="btn-spinner" id="btnSpinner"></span>
            </button>
          </div>

          <!-- Autocomplete Dropdown -->
          <div class="autocomplete-drop" id="autocompleteDrop"></div>
        </div>

        <div class="inline-msg" id="inlineMsg"></div>

        <!-- Search tips -->
        <div class="search-tips">
          <span class="tip-label">Try:</span>
          <button class="tip-chip" data-q="Almora, Uttrakhand">Almora</button>
          <button class="tip-chip" data-q="Lajpat Nagar, Delhi">Lajpat Nagar</button>
          <button class="tip-chip" data-q="Sohna, Haryana">Sohna</button>
          <button class="tip-chip" data-q="Shimla">Shimla</button>
        </div>

        <p class="panel-label" style="margin-top:18px;">Search History</p>
        <div class="history-wrap" id="historyWrap">
          <span class="no-history" id="noHistory">No history yet</span>
        </div>
        <button class="clear-hist-btn" id="clearHistBtn">✕ Clear history</button>
      </section>

      <!-- RIGHT: Weather Info Panel -->
      <section class="panel panel-right" id="panelRight">
        <p class="panel-label">Weather Info</p>

        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🌍</div>
          <p>Search a city to see weather</p>
        </div>
